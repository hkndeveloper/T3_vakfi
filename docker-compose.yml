services:
  postgres:
    image: postgres:16-alpine
    container_name: t3-yonetim-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: t3_yonetim
    ports:
      - "5432:5432"
    volumes:
      - t3_yonetim_pg_data:/var/lib/postgresql/data

volumes:
  t3_yonetim_pg_data:
